<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مشغّل المسلسلات</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000; width: 100%; height: 100%;
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── iframe يأخذ كل الشاشة ── */
    #frame-wrap { flex: 1; position: relative; overflow: hidden; }
    iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; border: none;
    }

    /* ── Loading ── */
    #loading {
      position: absolute; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; z-index: 10;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 4px solid #333; border-top-color: #e55000;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: #888; }

    /* ── شريط علوي للـ iframe فقط (لا يُرى) ── */
    #top-bar { height: 0; flex-shrink: 0; }
  </style>
</head>
<body>

  <div id="frame-wrap">
    <div id="loading">
      <div class="spinner"></div>
      <p id="loading-text">⏳ جارٍ تحميل المسلسل...</p>
    </div>
    <iframe
      id="tv-frame"
      allowfullscreen webkitallowfullscreen mozallowfullscreen
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture; web-share"
      referrerpolicy="no-referrer"
    ></iframe>
  </div>

  <!-- الزر خارج الـ iframe — عائم فوق الكل -->
  <div id="next-wrap" style="
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    z-index: 9999;
    transition: transform 0.45s cubic-bezier(0.16,1,0.3,1), opacity 0.45s;
    opacity: 0;
    pointer-events: none;
  ">
    <button id="next-btn" style="
      position: relative; overflow: hidden;
      background: rgba(229,80,0,0.95);
      color: #fff; border: none; border-radius: 50px;
      padding: 14px 28px;
      font-size: 16px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.7), 0 2px 8px rgba(229,80,0,0.5);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    ">
      <span id="btn-text">⏭ الحلقة التالية</span>
      <!-- شريط countdown -->
      <div id="cd-bar" style="
        position: absolute; bottom: 0; left: 0; right: 0;
        height: 3px; background: rgba(255,255,255,0.4);
        transform-origin: left; transform: scaleX(1);
      "></div>
    </button>
  </div>

  <script>
    // ── Telegram ──────────────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready(); tg.expand();
      tg.setHeaderColor?.('#000000');
      tg.setBackgroundColor?.('#000000');
      if (tg.isVersionAtLeast?.('6.1')) tg.setHeaderColor('#000000');
      if (tg.requestFullscreen) tg.requestFullscreen();
      tg.BackButton?.hide?.();
    }

    // ── Params ────────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const rawSrc = params.get('iframe') ? decodeURIComponent(params.get('iframe')) : '';

    const $loading     = document.getElementById('loading');
    const $loadingText = document.getElementById('loading-text');
    const $frame       = document.getElementById('tv-frame');
    const $wrap        = document.getElementById('next-wrap');
    const $btn         = document.getElementById('next-btn');
    const $btnText     = document.getElementById('btn-text');
    const $cdBar       = document.getElementById('cd-bar');

    if (!rawSrc) {
      $loading.innerHTML = '<p style="color:#f66">❌ رابط غير صحيح</p>';
      throw new Error('no src');
    }

    // ── State ─────────────────────────────────────────────────────
    let currentSrc    = rawSrc;
    let currentSeason = 1;
    let currentEp     = 1;
    let totalEpisodes = null;
    let epDuration    = 40 * 60; // ثواني — افتراضي 40 دقيقة
    let tmdbId        = null;
    let imdbId        = null;
    let isVidlink     = rawSrc.includes('vidlink.pro');
    let showTimer     = null;
    let autoTimer     = null;
    let loadTime      = null;
    let btnVisible    = false;

    // ── Parse URL ─────────────────────────────────────────────────
    function parseEp(url) {
      const vs = url.match(/[?&]season=(\d+)[&]episode=(\d+)/);
      const vl = url.match(/\/tv\/\d+\/(\d+)\/(\d+)/);
      if (vs) return { season: +vs[1], episode: +vs[2] };
      if (vl) return { season: +vl[1], episode: +vl[2] };
      return null;
    }

    function buildNextUrl(url, s, e) {
      if (isVidlink)
        return url.replace(/\/tv\/(\d+)\/\d+\/\d+/, `/tv/$1/${s}/${e}`);
      return url
        .replace(/season=\d+/, `season=${s}`)
        .replace(/episode=\d+/, `episode=${e}`);
    }

    // ── TMDB: جلب مدة الحلقة وعدد الحلقات ───────────────────────
    function fetchEpInfo(tmdb, season, episode) {
      // مدة الحلقة المحددة
      fetch(`https://api.themoviedb.org/3/tv/${tmdb}/season/${season}/episode/${episode}?api_key=279b30c513119c7c2420ced53dc59ae2`)
        .then(r => r.json())
        .then(d => {
          if (d?.runtime && d.runtime > 0) {
            epDuration = d.runtime * 60; // تحويل لثواني
          }
          scheduleShow();
        })
        .catch(() => scheduleShow());

      // عدد حلقات الموسم
      fetch(`https://api.themoviedb.org/3/tv/${tmdb}/season/${season}?api_key=279b30c513119c7c2420ced53dc59ae2`)
        .then(r => r.json())
        .then(d => { totalEpisodes = d?.episodes?.length || null; })
        .catch(() => {});
    }

    // جلب tmdb id من imdb id
    function fetchTmdbFromImdb(imdb) {
      fetch(`https://api.themoviedb.org/3/find/${imdb}?api_key=279b30c513119c7c2420ced53dc59ae2&external_source=imdb_id`)
        .then(r => r.json())
        .then(d => {
          const tv = d?.tv_results?.[0];
          if (tv?.id) {
            tmdbId = String(tv.id);
            fetchEpInfo(tmdbId, currentSeason, currentEp);
          } else {
            scheduleShow(); // fallback
          }
        })
        .catch(() => scheduleShow());
    }

    // ── جدولة ظهور الزر ──────────────────────────────────────────
    // يظهر عند 90% من مدة الحلقة
    function scheduleShow() {
      clearTimeout(showTimer);
      const waitMs  = epDuration * 1000 * 0.90;
      const elapsed = loadTime ? (Date.now() - loadTime) : 0;
      const remain  = Math.max(waitMs - elapsed, 0);
      showTimer = setTimeout(showBtn, remain);
    }

    // ── إظهار الزر ───────────────────────────────────────────────
    function showBtn() {
      if (btnVisible) return;
      btnVisible = true;

      // حساب الحلقة التالية للنص
      let ns = currentSeason, ne = currentEp + 1;
      if (totalEpisodes && ne > totalEpisodes) { ns++; ne = 1; }
      $btnText.textContent = `⏭  الحلقة التالية`;

      // إظهار بأنيميشن
      $wrap.style.opacity   = '1';
      $wrap.style.transform = 'translateX(-50%) translateY(0)';
      $wrap.style.pointerEvents = 'auto';

      // countdown 15 ثانية
      $cdBar.style.transition = 'none';
      $cdBar.style.transform  = 'scaleX(1)';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        $cdBar.style.transition = 'transform 15s linear';
        $cdBar.style.transform  = 'scaleX(0)';
      }));

      autoTimer = setTimeout(goNext, 15000);
    }

    // ── إخفاء الزر ───────────────────────────────────────────────
    function hideBtn() {
      btnVisible = false;
      $wrap.style.opacity   = '0';
      $wrap.style.transform = 'translateX(-50%) translateY(100px)';
      $wrap.style.pointerEvents = 'none';
      clearTimeout(autoTimer);
      $cdBar.style.transition = 'none';
      $cdBar.style.transform  = 'scaleX(1)';
    }

    // ── الانتقال للحلقة التالية ───────────────────────────────────
    function goNext() {
      hideBtn();
      clearTimeout(showTimer);

      let s = currentSeason, e = currentEp + 1;
      if (totalEpisodes && e > totalEpisodes) { s++; e = 1; }

      currentSrc    = buildNextUrl(currentSrc, s, e);
      currentSeason = s;
      currentEp     = e;
      epDuration    = 40 * 60; // reset
      totalEpisodes = null;

      loadFrame(currentSrc);

      // جلب معلومات الحلقة الجديدة
      if (tmdbId) fetchEpInfo(tmdbId, s, e);
      else if (imdbId) fetchTmdbFromImdb(imdbId);
      else scheduleShow();
    }

    $btn.addEventListener('click', goNext);

    // ── postMessage fallback ──────────────────────────────────────
    window.addEventListener('message', (ev) => {
      const d = ev.data;
      if (!d) return;
      const s   = typeof d === 'string' ? d.toLowerCase() : '';
      const obj = typeof d === 'object' ? d : {};
      if (
        s.includes('next') || s.includes('ended') ||
        obj.type === 'NEXT_EPISODE' || obj.event === 'next' || obj.event === 'ended'
      ) showBtn();
    });

    // ── تحميل الإطار ─────────────────────────────────────────────
    function loadFrame(url) {
      clearTimeout(showTimer);
      hideBtn();
      $loading.style.display = 'flex';
      $loadingText.textContent = '⏳ جارٍ تحميل الحلقة...';
      loadTime = null;
      $frame.src = url;
    }

    $frame.addEventListener('load', () => {
      setTimeout(() => { $loading.style.display = 'none'; }, 400);
      loadTime = Date.now();
    });
    setTimeout(() => { $loading.style.display = 'none'; }, 7000);

    // ── Init ─────────────────────────────────────────────────────
    // استخراج المعرّفات من الرابط
    imdbId    = rawSrc.match(/imdb=(tt\d+)/)?.[1]  || null;
    tmdbId    = rawSrc.match(/\/tv\/(\d+)\//)?.[1]  || null;
    isVidlink = rawSrc.includes('vidlink.pro');

    const ep = parseEp(rawSrc);
    if (ep) { currentSeason = ep.season; currentEp = ep.episode; }

    loadFrame(rawSrc);

    if (tmdbId) {
      // vidlink — tmdb موجود مباشرة
      fetchEpInfo(tmdbId, currentSeason, currentEp);
    } else if (imdbId) {
      // vsembed — نحوّل imdb → tmdb أولاً
      fetchTmdbFromImdb(imdbId);
    } else {
      // لا يوجد معرّف — نستخدم المدة الافتراضية
      scheduleShow();
    }
  </script>
</body>
</html>
