<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مشغّل المسلسلات</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; width: 100%; height: 100%; overflow: hidden; }

    /* ── Loading ─────────────────────────────────────────────────── */
    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; gap: 14px; z-index: 50;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333; border-top-color: #e55000;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: #aaa; }

    /* ── Toast ───────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: rgba(20,20,20,0.92); color: #fff;
      padding: 9px 20px; border-radius: 20px;
      font-size: 13px; z-index: 200;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #toast.show { opacity: 1; }

    /* ── Controls bar ────────────────────────────────────────────── */
    #controls {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
      z-index: 100;
      transition: opacity 0.4s;
    }
    #controls.hidden { opacity: 0; pointer-events: none; }

    #ep-info {
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.5);
      padding: 5px 10px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #btn-next {
      display: flex; align-items: center; gap: 6px;
      background: #e55000; color: #fff;
      border: none; border-radius: 22px;
      padding: 9px 18px; font-size: 14px; font-weight: 600;
      cursor: pointer; direction: rtl;
      box-shadow: 0 2px 12px rgba(229,80,0,0.5);
      transition: transform 0.15s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-next:active { transform: scale(0.95); background: #c44400; }

    #btn-toggle {
      background: rgba(255,255,255,0.12); color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%; width: 34px; height: 34px;
      font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-toggle:active { background: rgba(255,255,255,0.25); }

    /* ── iframe ──────────────────────────────────────────────────── */
    iframe {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none; z-index: 5;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loading-text">⏳ جارٍ تحميل المسلسل...</p>
  </div>

  <div id="toast"></div>

  <!-- شريط التحكم السفلي -->
  <div id="controls">
    <button id="btn-toggle" title="إخفاء/إظهار">👁</button>
    <span id="ep-info">الحلقة —</span>
    <button id="btn-next">الحلقة التالية ⏭</button>
  </div>

  <iframe
    id="tv-frame"
    allowfullscreen webkitallowfullscreen mozallowfullscreen
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture; web-share"
    referrerpolicy="no-referrer"
  ></iframe>

  <script>
    // ── Telegram init ──────────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready(); tg.expand();
      tg.setHeaderColor?.('#000000');
      tg.setBackgroundColor?.('#000000');
      if (tg.isVersionAtLeast?.('6.1')) tg.setHeaderColor('#000000');
      if (tg.requestFullscreen) tg.requestFullscreen();
      tg.BackButton?.hide?.();
    }

    // ── Params ────────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const rawSrc = params.get('iframe') ? decodeURIComponent(params.get('iframe')) : '';

    const $loading     = document.getElementById('loading');
    const $loadingText = document.getElementById('loading-text');
    const $frame       = document.getElementById('tv-frame');
    const $toast       = document.getElementById('toast');
    const $controls    = document.getElementById('controls');
    const $epInfo      = document.getElementById('ep-info');
    const $btnNext     = document.getElementById('btn-next');
    const $btnToggle   = document.getElementById('btn-toggle');

    if (!rawSrc) {
      $loading.innerHTML = '<p style="color:#ff6b6b">❌ رابط غير صحيح</p>';
      throw new Error('No src');
    }

    // ── State ─────────────────────────────────────────────────────
    let currentSrc    = rawSrc;
    let currentSeason = 1;
    let currentEp     = 1;
    let totalEpisodes = null;
    let tmdbId        = null;
    let imdbId        = null;
    let isVidlink     = rawSrc.includes('vidlink.pro');
    let controlsVisible = true;
    let hideTimer     = null;

    // ── Helpers ───────────────────────────────────────────────────
    function parseEp(url) {
      const vs = url.match(/[?&]season=(\d+)[&]episode=(\d+)/);
      const vl = url.match(/\/tv\/\d+\/(\d+)\/(\d+)/);
      if (vs) return { season: +vs[1], episode: +vs[2] };
      if (vl) return { season: +vl[1], episode: +vl[2] };
      return null;
    }

    function buildNext(url, s, e) {
      if (isVidlink) {
        return url.replace(/\/tv\/(\d+)\/\d+\/\d+/, `/tv/$1/${s}/${e}`);
      }
      return url
        .replace(/season=\d+/, `season=${s}`)
        .replace(/episode=\d+/, `episode=${e}`);
    }

    function updateEpInfo() {
      $epInfo.textContent = `م${currentSeason} — ح${currentEp}`;
    }

    function showToast(msg, ms = 2800) {
      $toast.textContent = msg;
      $toast.classList.add('show');
      setTimeout(() => $toast.classList.remove('show'), ms);
    }

    function loadFrame(url, label = '') {
      $loading.style.display = 'flex';
      $loadingText.textContent = label || '⏳ جارٍ التحميل...';
      $frame.src = url;
      scheduleHide();
    }

    // ── Controls visibility ───────────────────────────────────────
    function showControls() {
      $controls.classList.remove('hidden');
      controlsVisible = true;
      scheduleHide();
    }

    function scheduleHide() {
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        $controls.classList.add('hidden');
        controlsVisible = false;
      }, 4000);
    }

    // النقر على الشاشة يُظهر/يُخفي الأزرار
    document.addEventListener('click', (e) => {
      if (e.target === $btnNext || e.target === $btnToggle) return;
      if (!controlsVisible) showControls();
    });

    $btnToggle.addEventListener('click', () => {
      if (controlsVisible) {
        clearTimeout(hideTimer);
        $controls.classList.add('hidden');
        controlsVisible = false;
      } else {
        showControls();
      }
    });

    // ── Next episode logic ────────────────────────────────────────
    function goNext() {
      let nextS = currentSeason;
      let nextE = currentEp + 1;

      // انتهت حلقات الموسم؟ → الموسم التالي
      if (totalEpisodes && nextE > totalEpisodes) {
        nextS = currentSeason + 1;
        nextE = 1;
        // جلب عدد حلقات الموسم الجديد
        fetchSeasonEpisodes(nextS);
      }

      const nextUrl = buildNext(currentSrc, nextS, nextE);
      showToast(`⏭  الموسم ${nextS} — الحلقة ${nextE}`);

      currentSrc    = nextUrl;
      currentSeason = nextS;
      currentEp     = nextE;
      updateEpInfo();
      loadFrame(nextUrl, `⏳ الموسم ${nextS} — الحلقة ${nextE}`);
    }

    $btnNext.addEventListener('click', goNext);

    // ── TMDB season info ──────────────────────────────────────────
    function fetchSeasonEpisodes(season) {
      if (!tmdbId) return;
      fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${season}?api_key=279b30c513119c7c2420ced53dc59ae2`)
        .then(r => r.json())
        .then(d => { totalEpisodes = d?.episodes?.length || null; })
        .catch(() => {});
    }

    // ── postMessage fallback (في حال اشتغل يوماً ما) ─────────────
    window.addEventListener('message', (ev) => {
      const d = ev.data;
      if (!d) return;
      const s   = typeof d === 'string' ? d.toLowerCase() : '';
      const obj = typeof d === 'object' ? d : {};
      const isNext =
        s.includes('next') || s.includes('ended') ||
        obj.type === 'NEXT_EPISODE' || obj.event === 'next' || obj.event === 'ended';
      if (isNext) goNext();
    });

    // ── Frame events ──────────────────────────────────────────────
    $frame.addEventListener('load', () => {
      setTimeout(() => { $loading.style.display = 'none'; }, 300);
      showControls();
    });
    setTimeout(() => { $loading.style.display = 'none'; }, 6000);

    // ── Init ──────────────────────────────────────────────────────
    imdbId   = rawSrc.match(/imdb=(tt\d+)/)?.[1]  || null;
    tmdbId   = rawSrc.match(/\/tv\/(\d+)\//)?.[1] || null;
    isVidlink = rawSrc.includes('vidlink.pro');

    const ep = parseEp(rawSrc);
    if (ep) { currentSeason = ep.season; currentEp = ep.episode; }

    updateEpInfo();
    fetchSeasonEpisodes(currentSeason);
    loadFrame(rawSrc);
    scheduleHide();
  </script>
</body>
</html>
