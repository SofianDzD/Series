<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مشغّل المسلسلات</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #000;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* ── iframe يأخذ كل المساحة ما عدا شريط الأزرار ── */
    #frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* ── شريط الأزرار السفلي — خارج الـ iframe تماماً ── */
    #bar {
      width: 100%;
      height: 52px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      gap: 8px;
      border-top: 1px solid #222;
      flex-shrink: 0;
      z-index: 999;
    }

    #ep-info {
      color: #aaa;
      font-size: 13px;
      white-space: nowrap;
    }

    #btn-next {
      background: #e55000;
      color: #fff;
      border: none;
      border-radius: 22px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(229,80,0,0.45);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.12s, background 0.15s;
    }
    #btn-next:active { transform: scale(0.94); background: #c44400; }

    /* ── Loading overlay فوق الـ iframe فقط ── */
    #loading {
      position: absolute; inset: 0;
      background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; gap: 12px;
      z-index: 10;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 4px solid #333; border-top-color: #e55000;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 13px; color: #888; }

    /* ── Toast ── */
    #toast {
      position: absolute; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      background: rgba(229,80,0,0.92);
      color: #fff; padding: 7px 18px;
      border-radius: 18px; font-size: 13px;
      white-space: nowrap; z-index: 20;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

  <!-- iframe + loading داخل wrapper -->
  <div id="frame-wrap">
    <div id="loading">
      <div class="spinner"></div>
      <p id="loading-text">⏳ جارٍ تحميل المسلسل...</p>
    </div>
    <div id="toast"></div>
    <iframe
      id="tv-frame"
      allowfullscreen webkitallowfullscreen mozallowfullscreen
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture; web-share"
      referrerpolicy="no-referrer"
    ></iframe>
  </div>

  <!-- شريط الأزرار خارج الـ iframe — لا يمكن للـ iframe إخفاؤه -->
  <div id="bar">
    <span id="ep-info">م— ح—</span>
    <button id="btn-next">⏭ الحلقة التالية</button>
  </div>

  <script>
    // ── Telegram ──────────────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready(); tg.expand();
      tg.setHeaderColor?.('#000000');
      tg.setBackgroundColor?.('#000000');
      if (tg.isVersionAtLeast?.('6.1')) tg.setHeaderColor('#000000');
      if (tg.requestFullscreen) tg.requestFullscreen();
      tg.BackButton?.hide?.();
    }

    // ── Params ────────────────────────────────────────────────────
    const params = new URLSearchParams(location.search);
    const rawSrc = params.get('iframe') ? decodeURIComponent(params.get('iframe')) : '';

    const $loading     = document.getElementById('loading');
    const $loadingText = document.getElementById('loading-text');
    const $frame       = document.getElementById('tv-frame');
    const $toast       = document.getElementById('toast');
    const $epInfo      = document.getElementById('ep-info');
    const $btnNext     = document.getElementById('btn-next');

    if (!rawSrc) {
      $loading.innerHTML = '<p style="color:#f66">❌ رابط غير صحيح</p>';
      throw new Error('No src');
    }

    // ── State ─────────────────────────────────────────────────────
    let currentSrc    = rawSrc;
    let currentSeason = 1;
    let currentEp     = 1;
    let totalEpisodes = null;
    let tmdbId        = null;
    let isVidlink     = rawSrc.includes('vidlink.pro');

    // ── Helpers ───────────────────────────────────────────────────
    function parseEp(url) {
      const vs = url.match(/[?&]season=(\d+)[&]episode=(\d+)/);
      const vl = url.match(/\/tv\/\d+\/(\d+)\/(\d+)/);
      if (vs) return { season: +vs[1], episode: +vs[2] };
      if (vl) return { season: +vl[1], episode: +vl[2] };
      return null;
    }

    function buildNextUrl(url, s, e) {
      if (isVidlink)
        return url.replace(/\/tv\/(\d+)\/\d+\/\d+/, `/tv/$1/${s}/${e}`);
      return url
        .replace(/season=\d+/, `season=${s}`)
        .replace(/episode=\d+/, `episode=${e}`);
    }

    function updateInfo() {
      $epInfo.textContent = `م${currentSeason}  ح${currentEp}`;
    }

    function showToast(msg) {
      $toast.textContent = msg;
      $toast.classList.add('show');
      setTimeout(() => $toast.classList.remove('show'), 2500);
    }

    function loadFrame(url, label) {
      $loading.style.display = 'flex';
      $loadingText.textContent = label || '⏳ جارٍ التحميل...';
      $frame.src = url;
    }

    function fetchSeasonEps(season) {
      if (!tmdbId) return;
      fetch(`https://api.themoviedb.org/3/tv/${tmdbId}/season/${season}?api_key=279b30c513119c7c2420ced53dc59ae2`)
        .then(r => r.json())
        .then(d => { totalEpisodes = d?.episodes?.length || null; })
        .catch(() => {});
    }

    // ── Next episode ──────────────────────────────────────────────
    function goNext() {
      let s = currentSeason;
      let e = currentEp + 1;

      if (totalEpisodes && e > totalEpisodes) {
        s = currentSeason + 1;
        e = 1;
        fetchSeasonEps(s);
      }

      currentSrc    = buildNextUrl(currentSrc, s, e);
      currentSeason = s;
      currentEp     = e;

      updateInfo();
      showToast(`⏭  م${s}  ح${e}`);
      loadFrame(currentSrc, `⏳ م${s} — ح${e}`);
    }

    $btnNext.addEventListener('click', goNext);

    // ── postMessage fallback ──────────────────────────────────────
    window.addEventListener('message', (ev) => {
      const d = ev.data;
      if (!d) return;
      const s   = typeof d === 'string' ? d.toLowerCase() : '';
      const obj = typeof d === 'object' ? d : {};
      if (
        s.includes('next') || s.includes('ended') ||
        obj.type === 'NEXT_EPISODE' || obj.event === 'next' || obj.event === 'ended'
      ) goNext();
    });

    // ── Frame load ────────────────────────────────────────────────
    $frame.addEventListener('load', () => {
      setTimeout(() => { $loading.style.display = 'none'; }, 300);
    });
    setTimeout(() => { $loading.style.display = 'none'; }, 6000);

    // ── Init ──────────────────────────────────────────────────────
    tmdbId    = rawSrc.match(/\/tv\/(\d+)\//)?.[1] || null;
    isVidlink = rawSrc.includes('vidlink.pro');

    const ep = parseEp(rawSrc);
    if (ep) { currentSeason = ep.season; currentEp = ep.episode; }

    updateInfo();
    fetchSeasonEps(currentSeason);
    loadFrame(rawSrc);
  </script>
</body>
</html>
