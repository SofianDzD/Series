<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مشغّل المسلسلات</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; width: 100%; height: 100%; overflow: hidden; }

    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; gap: 14px; z-index: 50;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333; border-top-color: #e50;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: #aaa; }

    iframe {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none; z-index: 5;
    }

    /* ── الطبقة الشفافة — تمنع نقرات الإعلانات ── */
    #shield {
      position: fixed; inset: 0;
      z-index: 20;
      /* شفافة تماماً — لا تظهر للمستخدم */
      background: transparent;
      /* نمرر الأحداث للطبقة نفسها فقط */
      touch-action: none;
    }

    /* ── أزرار التحكم — تظهر فوق الطبقة ── */
    #controls {
      position: fixed; inset: 0;
      z-index: 25;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #controls.visible { opacity: 1; }

    .skip-btn {
      pointer-events: all;
      width: 64px; height: 64px;
      background: rgba(0,0,0,0.55);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; gap: 2px;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .skip-btn svg { width: 28px; height: 28px; fill: #fff; }
    .skip-btn span { font-size: 10px; color: #fff; font-family: Arial; }

    /* زر التشغيل/الإيقاف — أكبر في الوسط */
    #play-btn {
      pointer-events: all;
      width: 72px; height: 72px;
      background: rgba(0,0,0,0.65);
      border: 2px solid rgba(255,255,255,0.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #play-btn svg { width: 36px; height: 36px; fill: #fff; }

    /* زر fullscreen */
    #fs-btn {
      position: fixed; bottom: 24px; right: 14px;
      width: 46px; height: 46px;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 30;
      opacity: 0; transition: opacity 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #fs-btn.visible { opacity: 1; }
    #fs-btn svg { width: 24px; height: 24px; fill: #fff; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>⏳ جارٍ تحميل المسلسل...</p></div>

  <iframe
    id="tv-frame"
    allowfullscreen webkitallowfullscreen mozallowfullscreen
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture; web-share"
    referrerpolicy="no-referrer"
  ></iframe>

  <!-- الطبقة الشفافة التي تمنع نقرات الإعلانات -->
  <div id="shield"></div>

  <!-- أزرار التحكم -->
  <div id="controls">
    <button class="skip-btn" id="skip-back">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      <span>10s</span>
    </button>

    <!-- زر التشغيل/الإيقاف في الوسط -->
    <button id="play-btn">
      <svg id="play-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
    </button>

    <button class="skip-btn" id="skip-fwd">
      <svg viewBox="0 0 24 24"><path d="M18 6h-2v12h2zm-3.5 6L6 6v12z"/></svg>
      <span>10s</span>
    </button>
  </div>

  <button id="fs-btn" title="ملء الشاشة">
    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  </button>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready(); tg.expand();
      tg.setHeaderColor?.('#000000');
      tg.setBackgroundColor?.('#000000');
      tg.headerColor = '#000000';
      if (tg.isVersionAtLeast?.('6.1')) tg.setHeaderColor('#000000');
      if (tg.requestFullscreen) tg.requestFullscreen();
      tg.BackButton?.hide?.();
    }

    const params    = new URLSearchParams(location.search);
    const iframeSrc = params.get('iframe') ? decodeURIComponent(params.get('iframe')) : '';
    const loading   = document.getElementById('loading');
    const frame     = document.getElementById('tv-frame');
    const shield    = document.getElementById('shield');
    const controls  = document.getElementById('controls');
    const fsBtn     = document.getElementById('fs-btn');
    const skipBack  = document.getElementById('skip-back');
    const skipFwd   = document.getElementById('skip-fwd');
    const playBtn   = document.getElementById('play-btn');
    const playIcon  = document.getElementById('play-icon');

    // ── حالة التشغيل ─────────────────────────────────────
    let isPlaying = true;

    const ICON_PAUSE = `<path d="M6 19h4V5H6zm8-14v14h4V5z"/>`;
    const ICON_PLAY  = `<path d="M8 5v14l11-7z"/>`;

    function updatePlayIcon() {
      playIcon.innerHTML = isPlaying ? ICON_PAUSE : ICON_PLAY;
    }

    // ── إظهار/إخفاء أزرار التحكم ─────────────────────────
    let hideTimer = null;

    function showControls() {
      controls.classList.add('visible');
      fsBtn.classList.add('visible');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(hideControls, 4000);
    }

    function hideControls() {
      controls.classList.remove('visible');
      fsBtn.classList.remove('visible');
    }

    // لمسة على الطبقة الشفافة = أظهر الأزرار (لا تفتح إعلان)
    shield.addEventListener('touchstart', (e) => {
      e.preventDefault(); // يمنع الحدث من الوصول للـ iframe
      showControls();
    }, { passive: false });

    shield.addEventListener('click', (e) => {
      e.preventDefault();
      showControls();
    });

    // ── أزرار التخطي ─────────────────────────────────────
    // نرسل postMessage للـ iframe لتخطي الوقت
    function seekFrame(seconds) {
      try {
        frame.contentWindow.postMessage({ type: 'seek', value: seconds }, '*');
      } catch(e) {}
      // fallback: محاولة الوصول المباشر
      try {
        const v = frame.contentDocument?.querySelector('video');
        if (v) v.currentTime += seconds;
      } catch(e) {}
      showControls();
    }

    skipBack.addEventListener('click', (e) => { e.stopPropagation(); seekFrame(-10); });
    skipFwd.addEventListener('click',  (e) => { e.stopPropagation(); seekFrame(10);  });

    // ── زر التشغيل/الإيقاف ───────────────────────────────
    playBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      isPlaying = !isPlaying;
      // postMessage للـ iframe
      try {
        frame.contentWindow.postMessage(
          { type: isPlaying ? 'play' : 'pause' }, '*'
        );
      } catch(e) {}
      // محاولة مباشرة
      try {
        const v = frame.contentDocument?.querySelector('video');
        if (v) isPlaying ? v.play() : v.pause();
      } catch(e) {}
      updatePlayIcon();
      showControls();
    });

    // ── Fullscreen ────────────────────────────────────────
    function enterFullscreen() {
      const req = frame.requestFullscreen || frame.webkitRequestFullscreen
               || frame.mozRequestFullScreen || frame.msRequestFullscreen;
      if (req) { req.call(frame).catch(() => {}); return; }
      if (tg?.requestFullscreen) { tg.requestFullscreen(); return; }
      const d = document.documentElement;
      (d.requestFullscreen || d.webkitRequestFullscreen)?.call(d);
    }

    function exitFullscreen() {
      (document.exitFullscreen || document.webkitExitFullscreen
       || document.mozCancelFullScreen)?.call(document);
    }

    fsBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      isFs ? exitFullscreen() : enterFullscreen();
      showControls();
    });

    document.addEventListener('fullscreenchange', updateFsIcon);
    document.addEventListener('webkitfullscreenchange', updateFsIcon);
    function updateFsIcon() {
      const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      fsBtn.innerHTML = isFs
        ? `<svg viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>`
        : `<svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>`;
    }

    // ── تحميل الـ iframe ──────────────────────────────────
    if (iframeSrc) {
      frame.src = iframeSrc;
      frame.addEventListener('load', () => {
        loading.style.display = 'none';
        setTimeout(() => { enterFullscreen(); showControls(); }, 800);
      }, { once: true });
      setTimeout(() => { loading.style.display = 'none'; }, 5000);
    } else {
      loading.innerHTML = '<p style="color:#ff6b6b">❌ رابط غير صحيح</p>';
    }
  </script>
</body>
</html>
