<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مشغّل المسلسلات</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100%; height: 100vh; overflow: hidden; }
    #loading { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; gap: 14px; z-index: 10; }
    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: #e50; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: #aaa; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 5; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>⏳ جارٍ تحميل المسلسل...</p></div>
  <iframe id="tv-frame" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>
  <script>
    const params = new URLSearchParams(location.search);
    const iframeSrc = params.get('iframe') ? decodeURIComponent(params.get('iframe')) : '';
    const loading = document.getElementById('loading');
    const frame   = document.getElementById('tv-frame');

    if (window.Telegram?.WebApp) {
      window.Telegram.WebApp.ready();
      window.Telegram.WebApp.expand();
      try { window.Telegram.WebApp.requestFullscreen?.(); } catch(e) {}
    }

    if (iframeSrc) {
      frame.src = iframeSrc;
      frame.addEventListener('load', () => { loading.style.display = 'none'; }, { once: true });
      setTimeout(() => { loading.style.display = 'none'; }, 4000);
    } else {
      loading.innerHTML = '<p style="color:#ff6b6b">❌ رابط غير صحيح</p>';
    }
  </script>
</body>
</html>
