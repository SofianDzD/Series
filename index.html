<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مشغّل المسلسلات</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      width: 100%; height: 100%;
      overflow: hidden;
      /* ملء كامل بما فيه منطقة الـ notch */
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* إخفاء شريط تيليجرام العلوي عبر CSS */
    .tg-header, [data-telegram-header] { display: none !important; }

    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; gap: 14px; z-index: 10;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333; border-top-color: #e50;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: #aaa; }

    iframe {
      position: fixed; inset: 0;
      width: 100vw; height: 100vh;
      border: none; z-index: 5;
    }

    /* زر ملء الشاشة */
    #fs-btn {
      position: fixed;
      bottom: 70px; right: 14px;
      width: 46px; height: 46px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 30;
    }
    #fs-btn svg { width: 24px; height: 24px; fill: #fff; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>⏳ جارٍ تحميل المسلسل...</p></div>
  <iframe id="tv-frame" allowfullscreen allow="autoplay; fullscreen; encrypted-media; picture-in-picture"></iframe>
  <button id="fs-btn">
    <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
  </button>

  <script>
    // ── Telegram WebApp init ──────────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.setHeaderColor?.('#000000');
      tg.setBackgroundColor?.('#000000');
      // إخفاء الهيدر والشريط العلوي
      tg.headerColor = '#000000';
      if (tg.isVersionAtLeast?.('6.1')) {
        tg.setHeaderColor('#000000');
      }
      // تفعيل وضع ملء الشاشة الكامل (Telegram Bot API 8.0+)
      if (tg.requestFullscreen) {
        tg.requestFullscreen();
      }
      // إخفاء زر الرجوع إذا كان ظاهراً
      tg.BackButton?.hide?.();
    }

    const params    = new URLSearchParams(location.search);
    const iframeSrc = params.get('iframe') ? decodeURIComponent(params.get('iframe')) : '';
    const loading   = document.getElementById('loading');
    const frame     = document.getElementById('tv-frame');
    const fsBtn     = document.getElementById('fs-btn');

    // ── Fullscreen ──────────────────────────────────────────
    fsBtn.addEventListener('click', () => {
      // الأولوية: Telegram API (يخفي الشريط العلوي كاملاً)
      if (tg?.requestFullscreen) {
        tg.requestFullscreen();
        return;
      }
      // Android / باقي المتصفحات
      const el = document.documentElement;
      const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
      if (req) req.call(el);
    });

    // تحديث أيقونة الزر عند الدخول/الخروج من fullscreen
    document.addEventListener('fullscreenchange', updateFsIcon);
    document.addEventListener('webkitfullscreenchange', updateFsIcon);
    function updateFsIcon() {
      const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
      fsBtn.innerHTML = isFs
        ? `<svg viewBox="0 0 24 24"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg>`
        : `<svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>`;
    }

    // ── تحميل الـ iframe ──────────────────────────────────
    if (iframeSrc) {
      frame.src = iframeSrc;
      frame.addEventListener('load', () => { loading.style.display = 'none'; }, { once: true });
      setTimeout(() => { loading.style.display = 'none'; }, 4000);
    } else {
      loading.innerHTML = '<p style="color:#ff6b6b">❌ رابط غير صحيح</p>';
    }
  </script>
</body>
</html>
