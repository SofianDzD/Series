<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>مشغّل المسلسلات</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; width: 100%; height: 100%; overflow: hidden; }

    #loading {
      position: fixed; inset: 0; background: #000;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; gap: 14px; z-index: 50;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #333; border-top-color: #e50;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 14px; color: #aaa; }

    iframe {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none; z-index: 5;
    }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>⏳ جارٍ تحميل المسلسل...</p></div>

  <iframe
    id="tv-frame"
    allowfullscreen webkitallowfullscreen mozallowfullscreen
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture; web-share"
    referrerpolicy="no-referrer"
    sandbox="allow-scripts allow-same-origin allow-forms allow-presentation allow-pointer-lock"
  ></iframe>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready(); tg.expand();
      tg.setHeaderColor?.('#000000');
      tg.setBackgroundColor?.('#000000');
      tg.headerColor = '#000000';
      if (tg.isVersionAtLeast?.('6.1')) tg.setHeaderColor('#000000');
      if (tg.requestFullscreen) tg.requestFullscreen();
      tg.BackButton?.hide?.();
    }

    // ── منع فتح نوافذ جديدة (الإعلانات) ─────────────────
    window.open = () => null;

    document.addEventListener('click', (e) => {
      const a = e.target.closest('a');
      if (a && (a.target === '_blank' || a.target === '_top')) {
        e.preventDefault();
        e.stopPropagation();
      }
    }, true);

    const params    = new URLSearchParams(location.search);
    const iframeSrc = params.get('iframe') ? decodeURIComponent(params.get('iframe')) : '';
    const loading   = document.getElementById('loading');
    const frame     = document.getElementById('tv-frame');

    if (iframeSrc) {
      frame.src = iframeSrc;
      frame.addEventListener('load', () => {
        loading.style.display = 'none';
        try {
          frame.contentWindow.open = () => null;
          frame.contentDocument.addEventListener('click', (e) => {
            const a = e.target.closest('a');
            if (!a) return;
            try {
              const url = new URL(a.href);
              const src = new URL(iframeSrc);
              if (url.hostname !== src.hostname) {
                e.preventDefault();
                e.stopPropagation();
              }
            } catch { e.preventDefault(); }
          }, true);
        } catch (err) {}
      }, { once: true });
      setTimeout(() => { loading.style.display = 'none'; }, 5000);
    } else {
      loading.innerHTML = '<p style="color:#ff6b6b">❌ رابط غير صحيح</p>';
    }
  </script>
</body>
</html>
